<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TaskFlow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .container {
    max-width: 600px;
    text-align: center;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .tagline {
    color: #8b949e;
    font-size: 1.1rem;
    margin-bottom: 2rem;
  }
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  a {
    display: inline-block;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: background 0.15s;
  }
  .primary {
    background: #238636;
    color: #fff;
  }
  .primary:hover { background: #2ea043; }
  .secondary {
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
  }
  .secondary:hover { background: #30363d; }
  .status {
    color: #8b949e;
    font-size: 0.85rem;
  }
  .status a {
    color: #58a6ff;
    padding: 0;
    background: none;
    border: none;
    font-size: inherit;
  }
</style>
</head>
<body>
<div class="container">
  <h1>TaskFlow</h1>
  <p class="tagline">Kanban boards with workflow state machines, built for human + AI collaboration.</p>
  <div class="links">
    <a class="primary" href="/dashboard">Dashboard</a>
    <a class="secondary" href="/docs">API Docs</a>
    <a class="secondary" href="/health">Health</a>
    <a class="secondary" href="https://github.com/bricef/taskflow">GitHub</a>
  </div>
  <p class="status">Server is running. See the <a href="https://github.com/bricef/taskflow">README</a> for CLI, TUI, and MCP setup.</p>
</div>
</body>
</html>
